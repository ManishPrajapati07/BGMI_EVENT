<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BGMI Event Registration</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">

  <!-- Hero Background -->
  <section class="min-h-screen bg-[url('bgmi.jpg')] bg-cover bg-center relative flex items-center justify-center">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-black/80"></div>

    <!-- Register Card -->
    <div class="relative z-10 bg-black/80 p-10 rounded-2xl shadow-2xl w-full max-w-lg border border-yellow-400">

      <!-- Logo -->
      <div class="text-center">
        <h1 class="text-3xl font-extrabold text-yellow-400">Tournament Registration</h1>
        <p class="mt-2 text-gray-300">
          Join the ultimate  battle!
        </p>
      </div>

      <!-- Form -->
      <form class="mt-8 space-y-4">

        <input type="text" placeholder="Team Name"
          class="w-full p-3 rounded bg-gray-900 border border-gray-600 focus:border-yellow-400 outline-none">

        <input type="text" placeholder="Leader Name"
          class="w-full p-3 rounded bg-gray-900 border border-gray-600 focus:border-yellow-400 outline-none">

        <input type="email" placeholder="Email Address"
          class="w-full p-3 rounded bg-gray-900 border border-gray-600 focus:border-yellow-400 outline-none">

        <input type="tel" placeholder="Mobile Number"
          class="w-full p-3 rounded bg-gray-900 border border-gray-600 focus:border-yellow-400 outline-none">

        <select
          class="w-full p-3 rounded bg-gray-900 border border-gray-600 focus:border-yellow-400 outline-none">
          <option>Select Squad Size</option>
          <option>4 Players (Squad)</option>
          <option>2 Players (Duo)</option>
          <option>1 Player (Solo)</option>
        </select>

        <textarea rows="3" placeholder="Player IDs (comma separated)"
          class="w-full p-3 rounded bg-gray-900 border border-gray-600 focus:border-yellow-400 outline-none"></textarea>

        <!-- Button -->
        <button type="submit"
          class="w-full bg-gradient-to-r from-red-600 to-yellow-500 text-black font-bold py-3 rounded-lg hover:scale-105 transition">
          🎯 Register Now
        </button>
      </form>

      <p class="text-center text-sm text-gray-400 mt-4">
        Venue: Aryabhatt Auditorium, E-Block, 5th Floor
      </p>
    </div>
  </section>

</body>
</html>
